image boot.vfat {
    vfat {
        files = {
            "bcm2711-rpi-4-b.dtb",
            "start4.elf",
            "fixup4.dat",
            "overlays",
            "Image",
            "config.txt",
            "cmdline.txt",
        }
        label = "boot"
        extraargs = "-F 32"
    }
    size = 128M
}

image sdcard.img {
    hdimage {
        align = 4M
    }

    partition boot {
        partition-type = 0xC
        bootable = "true"
        image = "boot.vfat"
    }

    partition root {
        partition-type = 0x83
        image = "rootfs.ext4"
    }
}
